dataset:
  path_to_data: data/casl_3305_runs_inter.h5
  fraction_of_data: 0.1

  inputs:
    power_W_g: MinMax
  targets:
    U238: MinMax
    U239: MinMax
    Np239: MinMax
    Pu239: MinMax


  target_delta_conc: False
  train:
    batch_size: 64
  val:
    batch_size: 300
    
model:
  name: matrix_ode_4x4_zeroed_Test
  matrix_ode: true        # Use depletion matrix: dy/dt = A(forcing) @ y
  layers: [64, 64]
  dropout_probability: 0.0
  activation: gelu
  output_activation: none
  residual_connections: false

  # Zero entries in the depletion matrix [row, col] (0-indexed, matching target order)
  # Target order: U238(0), U239(1), Np239(2), Pu239(3)
  # Physical chain: U238 -> U239 -> Np239 -> Pu239  (only adjacent transitions)
  matrix_zero_entries: [      [0,1],[0,2],[0,3],
                                    [1,2],[1,3],
                        [2,0],            [2,3],
                        [3,0],[3,1]             ]

train:
  loss: mse
  learning_rate: 4e-3
  weight_decay: 0.0
  lr_scheduler_patience: 50
  num_epochs: 10000
  early_stopping_patience: 200
  grad_clip: 0.0 # Lets try and disable grad clip
  drop_last: false

  solver: dopri5    # dopri5 rk4 implicit_adams
  rtol: 1e-4       
  atol: 1e-5        
  step_size: 0.01   # only used for rk4

runtime:
  mode: train
  model: NODE
  ckp_path: /mnt/iusers01/fse-ugpgt01/compsci01/t97807fs/scratch/Nuclear_Transport_With_ML/ML/results/matrix_ode_3x3_burnup/best-matrix_ode_3x3_burnup-epoch=283.ckpt
  device: cuda
  seed: 42
  num_workers: 12
  model_database: Chain_Model.db